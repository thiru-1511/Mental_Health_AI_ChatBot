<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - SereneMind AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-card {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px 40px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s ease-out;
            margin: 20px;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .auth-header { text-align: center; margin-bottom: 25px; }
        .auth-header h1 { font-size: 1.8rem; background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .auth-header p { color: #94a3b8; font-size: 0.9rem; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

        .form-group { margin-bottom: 15px; position: relative; }
        .form-group.full-width { grid-column: span 2; }
        @media (max-width: 500px) { .form-group.full-width { grid-column: span 1; } }

        .form-group i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: #6366f1; font-size: 0.9rem; }
        .form-group input, .form-group select { 
            width: 100%; 
            background: rgba(15, 23, 42, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 12px; 
            padding: 12px 12px 12px 42px; 
            color: #fff; 
            font-size: 0.95rem; 
            outline: none;
            transition: 0.3s;
        }
        .form-group select { appearance: none; cursor: pointer; }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent-color); background: rgba(15, 23, 42, 0.8); }

        .auth-btn { 
            width: 100%; 
            background: var(--user-msg-bg); 
            color: white; 
            border: none; 
            border-radius: 12px; 
            padding: 14px; 
            font-size: 1rem; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 10px;
            margin-top: 10px;
        }
        .auth-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(139, 92, 246, 0.4); filter: brightness(1.1); }

        .auth-footer { text-align: center; margin-top: 20px; color: #94a3b8; font-size: 0.85rem; }
        .auth-footer a { color: var(--accent-color); text-decoration: none; font-weight: 600; margin-left: 5px; }

        .flash-msg { padding: 10px; border-radius: 10px; margin-bottom: 20px; font-size: 0.85rem; text-align: center; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #fca5a5; }
    </style>
</head>
<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="auth-card">
        <div class="auth-header">
            <h1>Welcome to mental health chatbot ai.</h1>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="flash-msg">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('register') }}" method="POST">
            <div class="form-grid">
                <div class="form-group">
                    <input type="text" name="username" placeholder="Username" required>
                    <i class="fa-solid fa-user-tag"></i>
                </div>
                <div class="form-group">
                    <input type="email" name="email" placeholder="Email Address" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="form-group">
                    <input type="password" name="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="form-group">
                    <input type="text" name="full_name" placeholder="Full Name">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="form-group">
                    <input type="number" name="age" placeholder="Age" min="1" max="120">
                    <i class="fa-solid fa-calendar-days"></i>
                </div>
                <div class="form-group">
                    <select name="gender">
                        <option value="" disabled selected>Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                        <option value="Prefer not to say">Prefer not to say</option>
                    </select>
                    <i class="fa-solid fa-venus-mars"></i>
                </div>
                <div class="form-group full-width">
                    <input type="text" name="occupation" placeholder="Occupation / Specialization">
                    <i class="fa-solid fa-briefcase"></i>
                </div>
                <div class="form-group full-width">
                    <select name="role" required style="padding-left: 42px;">
                        <option value="Patient" selected>I am a Patient</option>
                        <option value="Doctor">I am a Specialist (Doctor)</option>
                    </select>
                    <i class="fa-solid fa-user-shield"></i>
                </div>
            </div>
            
            <button type="submit" class="auth-btn">
                <span>Register</span>
                <i class="fa-solid fa-user-plus"></i>
            </button>
        </form>

        <div class="auth-footer">
            Already have an account?<a href="{{ url_for('login') }}">Sign In</a>
        </div>
    </div>
</body>
</html>
